name: flutter_omr_app
description: OMR Öğretmen Uygulaması - Optik sınav değerlendirme
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.4
  firebase_storage: ^12.3.7
  google_sign_in: ^6.2.2

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Image / Camera
  image_picker: ^1.1.2
  google_mlkit_document_scanner: ^0.1.1

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
